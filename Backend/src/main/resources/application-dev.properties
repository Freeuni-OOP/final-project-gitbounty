# Development Profile - Local MySQL Database

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# MySQL Database Configuration (local Docker container)
spring.datasource.url=jdbc:mysql://localhost:3306/gitbounty_dev
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=dev_user
spring.datasource.password=dev_password

# Keycloak issuer for JWT validation when running locally
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/gitbounty}

# Client used by the custom HTTP Basic -> Keycloak password grant flow
keycloak.client-id=${KEYCLOAK_CLIENT_ID:gitbounty-backend}
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:gitbounty-backend-secret}

# Flyway uses the MySQL root account so it can create the Keycloak database/user
spring.flyway.user=root
spring.flyway.password=root_password

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2



