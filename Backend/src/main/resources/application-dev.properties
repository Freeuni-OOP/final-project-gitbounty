# Development Profile - Local MySQL Database

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.default_schema=gitbounty

# MySQL Database Configuration (local Docker container)
spring.datasource.url=jdbc:mysql://localhost:3306/gitbounty
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=dev_user
spring.datasource.password=dev_password



# Flyway uses the MySQL root account so it can create the Keycloak database/user
spring.flyway.user=root
spring.flyway.password=root_password
spring.flyway.default-schema=gitbounty

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2




