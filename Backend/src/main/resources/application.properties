spring.application.name=Backend
server.port=8081
spring.docker.compose.enabled=false

# Default profile for local development
spring.profiles.active=dev

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/gitbounty}

# Defer datasource init so Flyway runs first before JPA tries to validate schema
spring.jpa.defer-datasource-initialization=true

spring.flyway.enabled=true
logging.level.org.flywaydb.core=INFO

# Git repositories are stored relative to the app working directory by default.
# Override with GIT_REPOSITORIES_ROOT when needed.
git.repositories-root=${GIT_REPOSITORIES_ROOT:repositories}

#Added for Nginx reverse proxy support to correctly handle X-Forwarded-* headers for client IP and protocol
server.forward-headers-strategy=FRAMEWORK
# Client used by the custom HTTP Basic -> Keycloak password grant flow
keycloak.client-id=${KEYCLOAK_CLIENT_ID:gitbounty-backend}
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:gitbounty-backend-secret}

# ===================================================================
# OpenAPI & Swagger UI Configuration
# ===================================================================
# Enables or disables the core OpenAPI documentation generation
springdoc.api-docs.enabled=true

# Enables the "Authorize" button popup inside Swagger UI to store OAuth2 tokens
springdoc.swagger-ui.oauth.clientId=gitbounty-frontend
springdoc.swagger-ui.oauth.use-pkce-with-authorization-code-grant=true