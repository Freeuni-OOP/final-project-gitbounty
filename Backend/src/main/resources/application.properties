spring.application.name=Backend
server.port=8081
spring.docker.compose.enabled=false

# Default profile for local development
spring.profiles.active=dev

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Defer datasource init so Flyway runs first before JPA tries to validate schema
spring.jpa.defer-datasource-initialization=true

spring.flyway.enabled=true
logging.level.org.flywaydb.core=INFO

# Git repositories are stored relative to the app working directory by default.
# Override with GIT_REPOSITORIES_ROOT when needed.
git.repositories-root=${GIT_REPOSITORIES_ROOT:repositories}


