


# Tell Spring to use the H2 in-memory database for testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver

# Tell Hibernate to automatically build the tables based on your annotations
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# TURN OFF FLYWAY FOR TESTS so it doesn't crash the H2 database
spring.flyway.enabled=false