server {
    listen 80;
    server_name gitbounty.com www.gitbounty.com;
    return 301 https://$host$request_uri;
}

# 2. Handle Secure HTTPS Traffic
server {
    listen 443 ssl;
    server_name gitbounty.com www.gitbounty.com;

    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    # Production-ready SSL settings (disables old, vulnerable TLS versions)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # CRITICAL: Tells Spring Boot the original incoming request was HTTPS!
        proxy_set_header X-Forwarded-Proto https;
    }
}